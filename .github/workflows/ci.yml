name: Flask CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest

  docker-build:
    needs: test # This ensures Docker only builds if tests pass
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Build Docker image
      run: docker build -t my-flask-app .

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Azure Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Navigate to the cloned repository on Azure
          cd /home/azureuser/SoftEng
          
          # 2. Pull the latest code from GitHub
          git pull origin main
          
          # 3. Build the fresh Docker image
          docker build -t my-flask-app .
          
          # 4. Stop and remove the old container (ignoring errors if it doesn't exist yet)
          docker stop flask_app || true
          docker rm flask_app || true
          
          # 5. Start the new container on port 80
          docker run -d -p 80:5000 --name flask_app my-flask-app